# ============================================================
# ALACRITTY CONFIGURATION (Catppuccin Macchiato Style)
# ============================================================


# COLORS =====================================================
general.import = [
  # uncomment the flavour you want below:
  # "~/.config/alacritty/catppuccin-latte.toml"
  # "~/.config/alacritty/catppuccin-frappe.toml"
  # "~/.config/alacritty/catppuccin-macchiato.toml"
  "~/.config/alacritty/catppuccin-mocha.toml"
]


# WINDOW =====================================================
[window]
opacity = 1
dynamic_title = true

[window.padding]
x = 15
y = 12

[window.class]
instance = "Alacritty"
general = "Alacritty"


# FONT =======================================================
[font]
size = 11.0

[font.normal]
family = "FiraCode Nerd Font Mono"
style = "Regular"

[font.bold]
family = "FiraCode Nerd Font Mono"
style = "SemiBold"

[font.italic]
family = "FiraCode Nerd Font Mono"
style = "Italic"


# CURSOR =====================================================
[cursor]
style = { shape = "Block", blinking = "On" }
blink_interval = 500
unfocused_hollow = true


# SCROLLING ==================================================
[scrolling]
history = 10000
multiplier = 3


# SELECTION ==================================================
[selection]
save_to_clipboard = true
